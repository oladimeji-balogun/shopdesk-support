
services:
  database: 
    env_file:
      - .env
    image: postgres:15 
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 35s
      retries: 5
      

  backend: 
    env_file:
      - .env
    depends_on:
      database: 
        condition: service_healthy 
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs 

volumes:
  postgres_data: 
    

    
      
    